<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Portal Login | Kaghan Properties</title>
    <meta name="robots" content="noindex, nofollow">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- Google Fonts: Outfit & Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .outfit {
            font-family: 'Outfit', sans-serif;
        }
        .glass {
            background: rgba(15, 23, 42, 0.65);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .gold-gradient {
            background: linear-gradient(135deg, #D4AF37 0%, #FFD700 50%, #B8860B 100%);
        }
        .text-gold {
            color: #D4AF37;
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen flex items-center justify-center relative overflow-hidden">
    
    <!-- Background Radial Glows -->
    <div class="absolute top-[-10%] left-[-10%] w-[50%] h-[50%] bg-[#D4AF37]/10 rounded-full blur-[120px] pointer-events-none"></div>
    <div class="absolute bottom-[-10%] right-[-10%] w-[50%] h-[50%] bg-amber-600/10 rounded-full blur-[120px] pointer-events-none"></div>
    
    <div class="glass max-w-md w-full mx-4 p-10 rounded-[2.5rem] shadow-2xl relative z-10 animate-fade-in">
        <div class="text-center mb-8">
            <a href="index.html">
                <img src="assets/images/logo.png" alt="Kaghan Properties Logo" class="h-16 w-auto mx-auto mb-4 object-contain" onerror="this.src='stay/assets/images/logo.png'">
            </a>
            <h1 class="text-3xl font-bold outfit text-white tracking-wider uppercase">Secure Portal</h1>
            <p class="text-slate-400 text-xs mt-1.5 uppercase tracking-widest">Kaghan Properties Login</p>
        </div>
        
        <form id="portal-login-form" class="space-y-6">
            <div>
                <label class="block text-[10px] uppercase font-bold text-slate-400 mb-2 tracking-widest">Email Address</label>
                <div class="relative">
                    <i class="fa-solid fa-envelope absolute left-4 top-[17px] text-slate-500 text-sm"></i>
                    <input type="email" id="login-email" required placeholder="admin@kaghan.com" class="w-full bg-slate-900/50 border border-slate-800 focus:border-[#D4AF37] rounded-xl pl-12 pr-5 py-3.5 text-sm text-white focus:outline-none focus:ring-1 focus:ring-[#D4AF37] transition-all">
                </div>
            </div>
            <div>
                <label class="block text-[10px] uppercase font-bold text-slate-400 mb-2 tracking-widest">Access Key</label>
                <div class="relative">
                    <i class="fa-solid fa-lock absolute left-4 top-[17px] text-slate-500 text-sm"></i>
                    <input type="password" id="login-password" required placeholder="••••••••" class="w-full bg-slate-900/50 border border-slate-800 focus:border-[#D4AF37] rounded-xl pl-12 pr-5 py-3.5 text-sm text-white focus:outline-none focus:ring-1 focus:ring-[#D4AF37] transition-all">
                </div>
            </div>
            
            <button type="submit" id="login-btn" class="w-full bg-gradient-to-r from-[#D4AF37] to-amber-500 hover:from-white hover:to-white hover:text-slate-950 text-slate-950 font-bold py-4 rounded-xl shadow-lg hover:shadow-[#D4AF37]/25 text-sm transition-all flex items-center justify-center gap-2 mt-8">
                Unlock Portal
                <i class="fa-solid fa-unlock text-xs"></i>
            </button>
            <div id="login-error" class="hidden text-center text-xs text-rose-500 font-semibold mt-4"></div>
        </form>
    </div>

    <!-- Firebase Core Compatibility Scripts -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <!-- DB and Users Script -->
    <script src="assets/js/db.js"></script>
    <script src="assets/js/users.js"></script>

    <script>
        document.getElementById('portal-login-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            const emailInput = document.getElementById('login-email').value;
            const pass = document.getElementById('login-password').value;
            const errorDiv = document.getElementById('login-error');
            const btn = document.getElementById('login-btn');

            // Apply case and space normalization as per security specifications
            const email = emailInput.toLowerCase().trim();

            errorDiv.classList.add('hidden');
            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-spinner animate-spin"></i> Checking authorization...';

            try {
                const res = await CorporateDB.login(email, pass);
                if (res.success) {
                    // Redirect directly to the appropriate dashboard
                    window.location.href = res.session.role === 'admin' ? 'admin/index.html' : 'index.html';
                } else {
                    errorDiv.innerText = res.message;
                    errorDiv.classList.remove('hidden');
                }
            } catch(e) {
                console.error(e);
                errorDiv.innerText = 'System error occurred. Check network connection.';
                errorDiv.classList.remove('hidden');
            } finally {
                btn.disabled = false;
                btn.innerHTML = 'Unlock Portal <i class="fa-solid fa-unlock text-xs"></i>';
            }
        });

        // Run check on load: If already logged in, redirect to respective dashboard
        window.addEventListener('load', () => {
            const user = CorporateDB.getCurrentUser();
            if (user) {
                if (user.role === 'admin') {
                    window.location.href = 'admin/index.html';
                }
            }
        });
    </script>
</body>
</html>
