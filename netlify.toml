# Redirect /stay/* paths on main domains to their stay subdomain counterparts
[[redirects]]
  host = "kaghanproperties.com"
  from = "/stay/*"
  to = "https://stay.kaghanproperties.com/:splat"
  status = 301
  force = true

[[redirects]]
  host = "kaghannew.com"
  from = "/stay/*"
  to = "https://stay.kaghannew.com/:splat"
  status = 301
  force = true

[[redirects]]
  host = "kaghan-new.com"
  from = "/stay/*"
  to = "https://stay.kaghan-new.com/:splat"
  status = 301
  force = true

# Default fallback redirect for other domains (e.g. Netlify deployment URL)
[[redirects]]
  from = "/stay/*"
  to = "https://stay.kaghanproperties.com/:splat"
  status = 301
  force = true

# Redirect default index files to root
[[redirects]]
  from = "/index.html"
  to = "/"
  status = 301

[[redirects]]
  from = "/index"
  to = "/"
  status = 301

[[redirects]]
  from = "/home"
  to = "/"
  status = 301

# Clean URLs rewrites
[[redirects]]
  from = "/about"
  to = "/about.html"
  status = 200

[[redirects]]
  from = "/services"
  to = "/services.html"
  status = 200

[[redirects]]
  from = "/projects"
  to = "/projects.html"
  status = 200

[[redirects]]
  from = "/blog"
  to = "/blog.html"
  status = 200

[[redirects]]
  from = "/contact"
  to = "/contact.html"
  status = 200

[[redirects]]
  from = "/under-construction"
  to = "/under-construction.html"
  status = 200

[build]
  publish = "."

[build.processing]
  skip_node_bundling = true

[build.processing.html]
  pretty_urls = true

[build.processing.images]
  compress = true

[build.processing.css]
  bundle = true
  minify = true

[build.processing.js]
  bundle = true
  minify = true
